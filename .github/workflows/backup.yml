name: Respaldo nocturno

# Respaldo automático de la base sin depender del dashboard de Railway.
# Se activa cuando existan la variable NIGHTLY_OPS=true y el secreto
# DATABASE_URL en el repositorio (ver OPERACIONES.md).
on:
  schedule:
    - cron: "0 9 * * *" # 09:00 UTC ≈ 03:00 CDMX
  workflow_dispatch: {}

jobs:
  backup:
    if: ${{ vars.NIGHTLY_OPS == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Instalar pg_dump 17 (PGDG)
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Respaldar la base
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm db:backup

      - name: Subir el respaldo como artefacto (retención 30 días)
        uses: actions/upload-artifact@v4
        with:
          name: alvsport-db-backup
          path: backups/*.dump
          retention-days: 30
